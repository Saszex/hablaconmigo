<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useCallback,useMemo,useRef}=React;

const LANGS={
  es:{name:'Hiszpański',flag:'🇪🇸',native:'Español',gr:h=>h<12?'¡Buenos días!':h<18?'¡Buenas tardes!':'¡Buenas noches!'},
  it:{name:'Włoski',flag:'🇮🇹',native:'Italiano',gr:h=>h<12?'Buongiorno!':h<18?'Buon pomeriggio!':'Buonasera!'},
  fr:{name:'Francuski',flag:'🇫🇷',native:'Français',gr:h=>h<12?'Bonjour!':h<18?'Bon après-midi!':'Bonsoir!'},
};

const LESSONS=[
  {id:1,icon:'👋',level:'A1',title:'Jak się przywitać i pożegnać?',
    sentences:[
      {es:'¡Hola! ¿Qué tal?',ph:'[ˈo.la ˈke ˈtal]',pl:'Cześć! Co słychać?',note:'¡Hola! działa o każdej porze dnia. ¿Qué tal? to nieformalne "co słychać" — używaj z kolegami, nie w urzędzie.'},
      {es:'Buenos días, ¿cómo está usted?',ph:'[ˈbwe.nos ˈdi.as ˈko.mo esˈta usˈted]',pl:'Dzień dobry, jak się Pan/Pani miewa?',note:'"Usted" to formalne "ty". W Ameryce Łacińskiej używane częściej niż w Hiszpanii. Dotyczy nieznajomych, starszych, przełożonych.'},
      {es:'¡Hasta mañana! Que descanses.',ph:'[ˈas.ta ma.ˈɲa.na ke des.ˈkan.ses]',pl:'Do jutra! Odpoczywaj.',note:'"Que descanses" = żebyś odpoczął/a. Ciepłe życzenie wieczorne. Dla grupy: Que descanséis.'},
      {es:'Buenas tardes, señora García.',ph:'[ˈbwe.nas ˈtar.ðes se.ˈɲo.ra ɣar.ˈθi.a]',pl:'Dzień dobry po południu, Pani García.',note:'Buenas tardes — od ok. 14:00 do zmierzchu. W Andaluzji mówią samo "Buenas" przez cały dzień!'},
      {es:'¡Hola a todos! ¿Cómo estáis?',ph:'[ˈo.la a ˈto.ðos ˈko.mo es.ˈtais]',pl:'Cześć wszystkim! Jak się macie?',note:'"Estáis" — forma dla grupy używana TYLKO w Hiszpanii. W Ameryce Łacińskiej: ¿Cómo están ustedes?'},
      {es:'Mucho gusto en conocerte.',ph:'[ˈmu.tʃo ˈɡus.to en ko.no.ˈθer.te]',pl:'Bardzo miło mi cię poznać.',note:'"Mucho gusto" pasuje wszędzie. Alternatywa: Encantado/Encantada — końcówka zależy od płci MÓWIĄCEGO.'},
      {es:'¡Adiós! ¡Cuídate mucho!',ph:'[a.ˈðjos ˈkwi.ða.te ˈmu.tʃo]',pl:'Do widzenia! Bardzo dbaj o siebie!',note:'"¡Cuídate!" pochodzi od cuidarse (dbać o siebie). Ciepłe pożegnanie. W pracy wolej "Hasta luego" — neutralniejsze.'},
      {es:'Nos vemos el lunes, ¿de acuerdo?',ph:'[nos ˈbe.mos el ˈlu.nes de a.ˈkwer.ðo]',pl:'Widzimy się w poniedziałek, dobrze?',note:'"¿De acuerdo?" = zgoda? / OK? Odpowiedź: "De acuerdo" lub "¡Vale!" — typowo hiszpańskie OK.'},
      {es:'¡Bienvenido a España! ¡Que disfrutes!',ph:'[bjen.be.ˈni.ðo a es.ˈpa.ɲa ke ðis.ˈfru.tes]',pl:'Witaj w Hiszpanii! Baw się dobrze!',note:'"Bienvenido" (on) / "Bienvenida" (ona) / "Bienvenidos" (grupa). "¡Que disfrutes!" — niech ci się podoba.'},
      {es:'Hasta pronto, espero verte de nuevo.',ph:'[ˈas.ta ˈpron.to es.ˈpe.ro ˈber.te de ˈnwe.βo]',pl:'Do zobaczenia wkrótce, mam nadzieję znowu cię zobaczyć.',note:'"Espero + bezokolicznik" = mam nadzieję coś zrobić. Naturalna konstrukcja: Espero verte (zobaczyć cię).'},
    ],
    dialog:{title:'Pierwsze spotkanie na kursie językowym',rA:'Ana',rB:'Bartosz',lines:[
      {r:'A',es:'¡Hola! Soy Ana. ¿Tú eres nuevo aquí?',pl:'Cześć! Jestem Ana. Czy jesteś tu nowy?'},
      {r:'B',es:'Sí, me llamo Bartosz. Soy de Polonia. ¡Mucho gusto!',pl:'Tak, nazywam się Bartosz. Jestem z Polski. Bardzo mi miło!'},
      {r:'A',es:'¡Encantada, Bartosz! ¿Hablas algo de español?',pl:'Miło mi, Bartosz! Mówisz trochę po hiszpańsku?'},
      {r:'B',es:'Muy poco, estoy aprendiendo. ¿Y tú? ¿Eres española?',pl:'Bardzo mało, uczę się. A ty? Jesteś Hiszpanką?'},
      {r:'A',es:'No, soy argentina, de Buenos Aires. ¡Pero hablo español nativo!',pl:'Nie, jestem Argentynką z Buenos Aires. Ale mówię jak native!'},
      {r:'B',es:'¡Qué interesante! Bueno, ¡hasta la próxima clase!',pl:'Jak ciekawe! No dobrze, do następnej lekcji!'},
    ]},
    quiz:[
      {q:'Jak powiesz "dzień dobry" rano?',opts:['Buenos días','Buenas tardes','Buenas noches','Buen día'],ok:0},
      {q:'Co oznacza "¡Cuídate!"?',opts:['Dbaj o siebie!','Do zobaczenia!','Jak się masz?','Dziękuję!'],ok:0},
      {q:'Skąd pochodzi Ana?',opts:['Z Argentyny','Z Hiszpanii','Z Polski','Z Meksyku'],ok:0},

  {id:2,icon:'🪪',level:'A1',title:'Jak się przedstawić?',
    sentences:[
      {es:'Me llamo Marcin, ¿y tú?',ph:'[me ˈʎa.mo mar.ˈθin i ˈtu]',pl:'Nazywam się Marcin, a ty?',note:'"Me llamo" pochodzi od llamarse (czasownik zwrotny). Naturalniejsze niż "Mi nombre es".'},
      {es:'Soy de Polonia, de la ciudad de Wrocław.',ph:'[ˈsoj de po.ˈlo.nja de la θju.ˈðað]',pl:'Jestem z Polski, z miasta Wrocław.',note:'KLUCZOWE: "Soy de" (SER) dla stałego pochodzenia. "Estoy en Wrocław" (ESTAR) dla tymczasowej lokalizacji.'},
      {es:'Tengo treinta y dos años.',ph:'[ˈteŋ.ɡo ˈtrejn.ta i ˈðos ˈa.ɲos]',pl:'Mam trzydzieści dwa lata.',note:'Wiek po hiszpańsku używa TENER (mieć), nie SER/ESTAR! Błąd: ~~Soy de 32 años~~.'},
      {es:'Soy ingeniero y trabajo en Varsovia.',ph:'[ˈsoj iŋ.xe.ˈnje.ro i tra.ˈβa.xo en βar.so.ˈβja]',pl:'Jestem inżynierem i pracuję w Warszawie.',note:'Zawód po "Soy" — BEZ przedimka! Po angielsku: "I am AN engineer", po hiszpańsku: "Soy ingeniero".'},
      {es:'Estoy casado y tengo dos hijos.',ph:'[es.ˈtoj ka.ˈsa.ðo i ˈteŋ.ɡo ˈðos ˈi.xos]',pl:'Jestem żonaty i mam dwoje dzieci.',note:'Stan cywilny używa ESTAR — bo może się zmienić! Estoy casado/a, divorciado/a, soltero/a.'},
      {es:'Mi esposa se llama Agnieszka.',ph:'[mi es.ˈpo.sa se ˈʎa.ma ag.ˈɲeʃ.ka]',pl:'Moja żona ma na imię Agnieszka.',note:'"Mi esposa" = moja żona (formalnie). Potocznie: "mi mujer". "Mi marido" = mój mąż. "Mi pareja" = partner/partnerka.'},
      {es:'Hablo polaco y un poco de inglés.',ph:'[ˈa.βlo po.ˈla.ko i un ˈpo.ko ðe iŋ.ˈɡles]',pl:'Mówię po polsku i trochę po angielsku.',note:'Języki po "hablo" — bez przedimka, małą literą! Skala: un poco → bastante bien → con fluidez.'},
      {es:'¿Cuántos años tienes tú?',ph:'[ˈkwan.tos ˈa.ɲos ˈtje.nes ˈtu]',pl:'Ile ty masz lat?',note:'Standardowe pytanie o wiek. Formalnie: ¿Cuántos años tiene usted?'},
      {es:'¿De dónde eres exactamente?',ph:'[de ˈdon.de ˈe.ɾes ek.sak.ta.ˈmen.te]',pl:'Skąd dokładnie pochodzisz?',note:'"¿De dónde eres?" — SER dla stałego pochodzenia. "¿Dónde estás?" (ESTAR) — gdzie jesteś teraz?'},
      {es:'Encantado de conocerle, señor Kowalski.',ph:'[en.kan.ˈta.ðo de ko.no.ˈθer.le se.ˈɲor]',pl:'Miło mi Pana poznać, Panie Kowalski.',note:'"Encantado" (mężczyzna) lub "Encantada" (kobieta) — przymiotnik zależy od płci MÓWIĄCEGO.'},
    ],
    dialog:{title:'Spotkanie biznesowe w Madrycie',rA:'Pani López',rB:'Marcin',lines:[
      {r:'A',es:'Buenas tardes. Soy Carmen López, directora de ventas.',pl:'Dzień dobry. Jestem Carmen López, dyrektorka sprzedaży.'},
      {r:'B',es:'Mucho gusto, señora López. Me llamo Marcin, soy de Polonia.',pl:'Bardzo mi miło, Pani López. Nazywam się Marcin, jestem z Polski.'},
      {r:'A',es:'¡Qué interesante! ¿Y a qué se dedica usted?',pl:'Jak interesująco! A czym się Pan zajmuje?'},
      {r:'B',es:'Soy ingeniero de software. Trabajo para una empresa polaca.',pl:'Jestem inżynierem oprogramowania. Pracuję dla polskiej firmy.'},
      {r:'A',es:'Perfecto. ¿Habla usted español con fluidez?',pl:'Doskonale. Czy mówi Pan płynnie po hiszpańsku?'},
      {r:'B',es:'No mucho, estoy aprendiendo. Pero entiendo bastante bien.',pl:'Niezbyt, uczę się. Ale rozumiem całkiem dobrze.'},
    ]},
    quiz:[
      {q:'Jak powiedzieć "Mam 35 lat"?',opts:['Tengo 35 años','Soy de 35 años','Estoy 35 años','Soy 35 viejo'],ok:0},
      {q:'Dlaczego "Soy ingeniero" — bez przedimka?',opts:['Przy zawodach po soy nie używamy przedimka','Bo słowo zaczyna się na samogłoskę','Zawsze pomijamy przedimek','To błąd'],ok:0},
      {q:'Czym zajmuje się Marcin?',opts:['Inżynier oprogramowania','Dyrektor sprzedaży','Tłumacz','Nauczyciel'],ok:0},
    ]},
  {id:3,icon:'😊',level:'A1',title:'Co słychać? Jak się masz?',
    sentences:[
      {es:'¿Cómo estás? ¿Todo bien?',ph:'[ˈko.mo es.ˈtas ˈto.ðo ˈβjen]',pl:'Jak się masz? Wszystko dobrze?',note:'Nieformalne (forma "ty"). Formalne: ¿Cómo está usted? Używamy ESTAR — pytamy o stan chwilowy.'},
      {es:'Estoy muy bien, gracias. ¿Y tú?',ph:'[es.ˈtoj muj ˈβjen ˈɡra.θjas i ˈtu]',pl:'Mam się bardzo dobrze, dziękuję. A ty?',note:'Na "gracias": De nada (nie ma za co), Con mucho gusto (z przyjemnością). Skala: muy bien → bien → regular → mal → fatal.'},
      {es:'Más o menos, estoy un poco cansado.',ph:'[mas o ˈme.nos es.ˈtoj un ˈpo.ko kan.ˈsa.ðo]',pl:'Tak sobie, jestem trochę zmęczony.',note:'"Más o menos" = dosłownie "więcej lub mniej" = tak sobie. Kobieta powie "cansada" — przymiotniki mają rodzaj!'},
      {es:'¡Estoy genial! Acabo de regresar de vacaciones.',ph:'[es.ˈtoj xe.ˈnjal a.ˈka.βo ðe re.ɣre.ˈsar de βa.ka.ˈsjo.nes]',pl:'Czuję się świetnie! Właśnie wróciłem z wakacji.',note:'"Acabo de + bezokolicznik" = właśnie zrobiłem. Superprzydatna! Acabo de comer (właśnie jadłem).'},
      {es:'Regular, tengo mucho trabajo esta semana.',ph:'[re.ɡu.ˈlar ˈteŋ.ɡo ˈmu.tʃo tra.ˈβa.xo ˈes.ta se.ˈma.na]',pl:'Przeciętnie, mam dużo pracy w tym tygodniu.',note:'FAŁSZYWY PRZYJACIEL: "regular" po polsku = regularny, ale po hiszpańsku = jako tako, nijako. Typowy błąd Polaków!'},
      {es:'No me encuentro bien, creo que tengo fiebre.',ph:'[no me en.ˈkwen.tro ˈβjen ˈkre.o ke ˈteŋ.ɡo ˈfje.βre]',pl:'Nie czuję się dobrze, chyba mam gorączkę.',note:'"Creo que" = myślę że. "Tengo fiebre" = mam gorączkę (TENER). Używaj u lekarza lub w aptece.'},
      {es:'¡Qué alegría verte! ¿Cuánto tiempo sin vernos?',ph:'[ke a.le.ˈɣri.a ˈβer.te ˈkwan.to ˈtjem.po sin ˈβer.nos]',pl:'Ale radość cię widzieć! Ile czasu minęło odkąd się nie widzieliśmy?',note:'"¡Qué + rzeczownik!" = co za / jakie: ¡Qué alegría! (co za radość!), ¡Qué frío! (co za zimno!).'},
      {es:'Estoy nervioso porque tengo una entrevista mañana.',ph:'[es.ˈtoj ner.ˈβjo.so ˈpor.ke ˈteŋ.ɡo ˈu.na en.tre.ˈβis.ta ma.ˈɲa.na]',pl:'Jestem zdenerwowany, bo mam jutro rozmowę kwalifikacyjną.',note:'"Porque" (bo) = spójnik przyczyny. Nie myl z "¿Por qué?" (dlaczego?) — to pytanie. Kobieta: Estoy nerviosa.'},
      {es:'Me siento un poco raro hoy, no sé por qué.',ph:'[me ˈsjen.to un ˈpo.ko ˈra.ro ˈoj no ˈse por.ˈke]',pl:'Czuję się dziś trochę dziwnie, nie wiem dlaczego.',note:'"Sentirse" = czuć się. Obie formy są poprawne: "Estoy cansado" i "Me siento cansado".'},
      {es:'¡Fenomenal! Acabo de tener muy buenas noticias.',ph:'[fe.no.me.ˈnal a.ˈka.βo ðe te.ˈner muj ˈβwe.nas no.ˈti.θjas]',pl:'Fenomenalnie! Właśnie dostałem bardzo dobre wiadomości.',note:'Skala: fenomenal → genial → muy bien → bien → regular → mal → fatal. "Fatal" = OKROPNIE (nie "fatalnie"!).'},
    ],
    dialog:{title:'Poniedziałkowy poranek w biurze',rA:'Karolina',rB:'Diego',lines:[
      {r:'A',es:'¡Buenos días, Diego! ¿Cómo fue el fin de semana?',pl:'Dzień dobry, Diego! Jak minął weekend?'},
      {r:'B',es:'¡Hola, Karolina! Fue genial, fui a la playa con la familia. ¿Y el tuyo?',pl:'Cześć, Karolina! Był świetny, pojechałem na plażę z rodziną. A twój?'},
      {r:'A',es:'Regular, la verdad. Estuve enferma todo el sábado.',pl:'Tak sobie, szczerze mówiąc. Byłam chora przez całą sobotę.'},
      {r:'B',es:'¡Qué pena! ¿Ya estás mejor?',pl:'Ale szkoda! Już lepiej?'},
      {r:'A',es:'Sí, mucho mejor, gracias. ¿Tienes mucho trabajo hoy?',pl:'Tak, znacznie lepiej, dziękuję. Masz dziś dużo pracy?'},
      {r:'B',es:'Más o menos. Tengo una reunión a las diez. ¡Hasta luego!',pl:'Mniej więcej. Mam spotkanie o dziesiątej. Do zobaczenia!'},
    ]},
    quiz:[
      {q:'Jak powiedzieć "właśnie zjadłem"?',opts:['Acabo de comer','Acabo comer','Acabé de comer ahora','Comí ahora mismo'],ok:0},
      {q:'Co oznacza "Fatal" jako odpowiedź na ¿Cómo estás?',opts:['Okropnie, bardzo źle','Doskonale!','Przeciętnie','Niezbyt dobrze'],ok:0},
      {q:'Dlaczego "Estoy cansado", a nie "Soy cansado"?',opts:['Zmęczenie to stan chwilowy (ESTAR), nie stała cecha (SER)','Bo cansado zaczyna się na c','SER tylko dla osób','Oba są poprawne'],ok:0},
    ]},
  {id:4,icon:'🌸',level:'A1',title:'Wielkanoc w Hiszpanii — kultura',
    sentences:[
      {es:'La Semana Santa es la celebración más importante del año.',ph:'[la se.ˈma.na ˈsan.ta es la θe.le.βra.ˈθjon mas im.por.ˈtan.te]',pl:'Wielki Tydzień to najważniejsza uroczystość roku.',note:'Semana Santa w Hiszpanii to głęboka uroczystość religijna. Najpiękniejsze procesje: Sewilla, Malaga, Valladolid.'},
      {es:'Las procesiones recorren las calles con pasos y música.',ph:'[las pro.θe.ˈsjo.nes re.ˈko.ren las ˈka.ʎes kon ˈpa.sos i ˈmu.si.ka]',pl:'Procesje przechodzą przez ulice z rzeźbami i muzyką.',note:'"Pasos" to platformy z figurami religijnymi. Niosą je "costaleros" — mogą ważyć kilka ton!'},
      {es:'¿Sabes qué se come en Semana Santa?',ph:'[ˈsa.βes ke se ˈko.me en se.ˈma.na ˈsan.ta]',pl:'Wiesz, co się je podczas Wielkiego Tygodnia?',note:'"¿Sabes qué...?" = czy wiesz, co? Tradycyjne potrawy: torrijas, potaje de vigilia, bacalao (solony dorsz).'},
      {es:'El Domingo de Resurrección celebramos con la familia.',ph:'[el do.ˈmiŋ.ɡo de re.su.rek.ˈθjon θe.le.ˈβra.mos kon la fa.ˈmi.lja]',pl:'W Niedzielę Zmartwychwstania świętujemy z rodziną.',note:'"Celebramos" = my świętujemy. Końcówka "-amos" to 1. os. l.mn. Wielkanoc w Hiszpanii = czas rodzinny.'},
      {es:'Los niños buscan huevos de chocolate escondidos en el jardín.',ph:'[los ˈni.ɲos ˈbus.kan ˈwe.βos de tʃo.ko.ˈla.te es.kon.ˈdi.ðos]',pl:'Dzieci szukają czekoladowych jajek ukrytych w ogrodzie.',note:'Tradycja szukania jajek to wpływ północnoeuropejski. Tradycyjnie: "monas de Pascua" od rodziców chrzestnych.'},
      {es:'¡Felices Pascuas! ¿Cómo celebráis en vuestra familia?',ph:'[fe.ˈli.θes ˈpas.kwas ˈko.mo θe.le.ˈβrais en ˈβwes.tra fa.ˈmi.lja]',pl:'Wesołych Świąt! Jak świętujecie w swojej rodzinie?',note:'UWAGA: "¡Felices Pascuas!" = i na Wielkanoc, i na Boże Narodzenie! Kontekst decyduje.'},
      {es:'En Sevilla, la Virgen de la Macarena es la más querida.',ph:'[en se.ˈβi.ʎa la ˈβir.xen de la ma.ka.ˈre.na es la mas ke.ˈri.ða]',pl:'W Sewilli Dziewica Makarena jest najbardziej ukochaną madonną.',note:'Gdy jej procesja wychodzi w Wielki Piątek, ludzie płaczą. Imię "Macarena" pochodzi od tej Madonny, nie od piosenki!'},
      {es:'Durante la Semana Santa, los españoles van al pueblo.',ph:'[du.ˈran.te la se.ˈma.na ˈsan.ta los es.pa.ˈɲo.les ban al ˈpwe.βlo]',pl:'Podczas Wielkiego Tygodnia Hiszpanie jeżdżą do wioski.',note:'"Ir al pueblo" = jechać do wioski dziadków. W czasie świąt wielkie miasta się wyludniają.'},
      {es:'Las torrijas son el postre típico de esta época.',ph:'[las to.ˈri.xas son el pos.ˈtre ˈti.pi.ko ðe ˈes.ta ˈe.po.ka]',pl:'Torrijas to typowy deser tej pory roku.',note:'Torrijas = chleb nasączony mlekiem, smażony z cynamonem i cukrem. Podobne do French toast! Przepis z XV w.'},
      {es:'Este año queremos ir a ver las procesiones en Málaga.',ph:'[ˈes.te ˈa.ɲo ke.ˈre.mos ir a ˈβer las pro.θe.ˈsjo.nes en ˈma.la.ɣa]',pl:'W tym roku chcemy pojechać zobaczyć procesje w Maladze.',note:'"Querer + bezokolicznik" = chcieć coś zrobić. Nieregularny (e→ie): quiero, quieres, quiere, queremos.'},
    ],
    dialog:{title:'Rozmowa o planach wielkanocnych',rA:'Marta',rB:'Paco',lines:[
      {r:'A',es:'Paco, ¿qué planes tienes para Semana Santa?',pl:'Paco, jakie masz plany na Wielki Tydzień?'},
      {r:'B',es:'Voy a mi pueblo, a casa de mis abuelos en Andalucía. ¿Y tú?',pl:'Jadę do mojej wioski, do domu moich dziadków w Andaluzji. A ty?'},
      {r:'A',es:'¡Qué bien! Nosotros queremos ver las procesiones en Sevilla.',pl:'Super! My chcemy zobaczyć procesje w Sewilli.'},
      {r:'B',es:'¡Os va a encantar! Son impresionantes, especialmente la Macarena.',pl:'Na pewno wam się spodoba! Są imponujące, zwłaszcza Makarena.'},
      {r:'A',es:'¿Y se come bien por allí en estas fechas?',pl:'A dobrze się je w tamtych stronach w tym czasie?'},
      {r:'B',es:'¡Claro! Hay torrijas en todos los bares. ¡Es tradición!',pl:'Oczywiście! Torrijas są w każdym barze. To tradycja!'},
    ]},
    quiz:[
      {q:'Co to są "pasos" w procesji?',opts:['Platformy z figurami religijnymi','Tańce wielkanocne','Słodycze','Muzycy w procesji'],ok:0},
      {q:'Jak powiedzieć "chcemy pojechać"?',opts:['Queremos ir','Queremos vamos','Quieremos ir','Queremos irnos'],ok:0},
      {q:'Kiedy używamy "¡Felices Pascuas!"?',opts:['Na Wielkanoc i Boże Narodzenie','Tylko na Wielkanoc','Tylko na Boże Narodzenie','Na każde święto'],ok:0},
    ]},
  {id:5,icon:'🙏',level:'A1',title:'Zwroty grzecznościowe',
    sentences:[
      {es:'Por favor, ¿me puede traer la carta?',ph:'[por fa.ˈβor me ˈpwe.ðe tra.ˈer la ˈkar.ta]',pl:'Proszę, czy może mi Pan/Pani przynieść kartę dań?',note:'"Por favor" zawsze ociepla prośbę. UWAGA: "la carta" = karta dań. "El menú" po hiszpańsku to DANIE DNIA!'},
      {es:'Gracias por todo, ha sido un placer.',ph:'[ˈɡra.θjas por ˈto.ðo a ˈsi.ðo un pla.ˈθer]',pl:'Dziękuję za wszystko, to była przyjemność.',note:'"Ha sido" = było (pretérito perfecto). "Un placer" = przyjemność. Eleganckie zakończenie spotkania.'},
      {es:'Perdona, ¿tienes un momento?',ph:'[per.ˈðo.na ˈtje.nes un mo.ˈmen.to]',pl:'Przepraszam, masz chwilę?',note:'KLUCZOWE: "Perdona/e" = przepraszam (przerywam komuś). "Lo siento" = przepraszam (wyrządziłem krzywdę). Nie zamieniaj!'},
      {es:'¡Lo siento mucho! Ha sido un error mío.',ph:'[lo ˈsjen.to ˈmu.tʃo a ˈsi.ðo un e.ˈror ˈmi.o]',pl:'Bardzo przepraszam! To był mój błąd.',note:'"Lo siento" dosłownie = "czuję to". Używasz gdy wyrządziłeś/aś komuś krzywdę lub wyrażasz współczucie.'},
      {es:'Con permiso, necesito pasar.',ph:'[kon per.ˈmi.so ne.θe.ˈsi.to pa.ˈsar]',pl:'Z przeproszeniem, muszę przejść.',note:'"Con permiso" = z pozwoleniem. Niezastąpione w metrze i autobusie. Odpowiedź: "Pase" lub ustąpienie miejsca.'},
      {es:'¿Puedo ayudarte en algo?',ph:'[ˈpwe.ðo a.ju.ˈðar.te en ˈal.ɣo]',pl:'Mogę ci w czymś pomóc?',note:'"Poder + bezokolicznik" = móc coś zrobić. "¿Puedo...?" = Czy mogę...? Wszechstronne wyrażenie.'},
      {es:'Sí, claro, con mucho gusto.',ph:'[ˈsi ˈkla.ro kon ˈmu.tʃo ˈɡus.to]',pl:'Tak, oczywiście, z przyjemnością.',note:'"Con mucho gusto" = elegancka odpowiedź na prośbę. Alternatywy: "De nada", "¡Claro que sí!", "¡Faltaría más!".'},
      {es:'Disculpe, creo que se ha equivocado de mesa.',ph:'[dis.ˈkul.pe ˈkre.o ke se a e.ki.βo.ˈka.ðo de ˈme.sa]',pl:'Przepraszam, myślę że pomylił się Pan ze stolikiem.',note:'"Disculpe" = bardziej eleganckie niż "Perdone". "Equivocarse" = mylić się. Forma zwrotna w pretérito perfecto.'},
      {es:'No hay de qué, ha sido un placer ayudarte.',ph:'[no aj ðe ˈke a ˈsi.ðo un pla.ˈθer a.ju.ˈðar.te]',pl:'Nie ma za co, to była przyjemność ci pomóc.',note:'"No hay de qué" = nie ma za co (elegantsze niż "De nada"). W Meksyku: "Para servirle" (do Pana usług).'},
      {es:'¿Le molesta si abro la ventana?',ph:'[le mo.ˈles.ta si ˈa.βro la βen.ˈta.na]',pl:'Czy przeszkadza Panu/Pani, jeśli otworzę okno?',note:'"¿Le molesta si...?" = czy przeszkadza Panu/Pani jeśli...? Bardzo grzeczna forma pytania o pozwolenie.'},
    ],
    dialog:{title:'W restauracji — elegancka obsługa',rA:'Kelner',rB:'Klient',lines:[

function sm2(card,rating){
  let{ef=2.5,interval=1,reps=0}=card;
  if(rating===1){reps=0;interval=1;ef=Math.max(1.3,ef-.2);}
  else if(rating===2){interval=Math.max(1,Math.round(interval*1.2));ef=Math.max(1.3,ef-.15);reps++;}
  else if(rating===3){interval=reps===0?1:reps===1?6:Math.round(interval*ef);reps++;}
  else{interval=reps===0?4:Math.round(interval*ef*1.3);ef=Math.min(2.5,ef+.1);reps++;}
  return{ef,interval,reps,dueDate:Date.now()+interval*86400000};
}
function iLabel(r,card){
  const{interval}=sm2(card,r);
  if(interval===1)return'1 dzień';
  if(interval<7)return`${interval} dni`;
  if(interval<30)return`${Math.round(interval/7)} tyg.`;
  return`${Math.round(interval/30)} mies.`;
}
function useLS(key,init){
  const[v,sv]=useState(()=>{try{const s=localStorage.getItem(key);return s?JSON.parse(s):init;}catch{return init;}});
  useEffect(()=>{try{localStorage.setItem(key,JSON.stringify(v));}catch{}},[key,v]);
  return[v,sv];
}

  return(
    <div>
      <div className="ph"><div className="pt">Fiszki SRS</div><div className="ps">{idx+1} / {due.length} · {cur?.lessonTitle}</div></div>
      <div className="ib" style={{marginBottom:18}}>💡 Kliknij fiszkę, by zobaczyć odpowiedź. Oceń szczerze — to klucz do działania SM-2!</div>
      <div className="fcs" onClick={()=>setFlip(f=>!f)}>
        <div className={`fc${flip?' flip':''}`}>
          <div className="ff ff-fr">
            <div className="fc-lbl">Przetłumacz na polski</div>
            <div className="fc-txt">{cur?.front}</div>
            {cur?.phonetic&&<div className="fc-sub">{cur.phonetic}</div>}
            {!flip&&<div className="fc-sub" style={{marginTop:18}}>👆 kliknij, by sprawdzić</div>}
          </div>
          <div className="ff ff-bk">
            <div className="fc-lbl">Tłumaczenie</div>
            <div className="fc-txt">{cur?.back}</div>
            {cur?.note&&<div className="fc-note">📌 {cur.note}</div>}
          </div>
        </div>
      </div>
      {flip&&(
        <div className="srsg">
          {[{r:1,cls:'sr1',lb:'Powtórz',ic:'😅'},{r:2,cls:'sr2',lb:'Trudna',ic:'😓'},{r:3,cls:'sr3',lb:'Dobrze',ic:'🙂'},{r:4,cls:'sr4',lb:'Łatwa',ic:'😄'}].map(b=>(
            <button key={b.r} className={`srsb ${b.cls}`} onClick={()=>rate(b.r)}><span>{b.ic} {b.lb}</span><span className="sri">{iLabel(b.r,cur)}</span></button>
          ))}
        </div>
      )}
      <div className="fcdot">{due.map((_,i)=>(<span key={i} style={{display:'inline-block',width:7,height:7,borderRadius:'50%',margin:'0 2px',background:i<idx?'var(--ol)':i===idx?'var(--te)':'var(--bd)'}}/>))}</div>
    </div>
  );
}

function RoleplayView({apiKey,addMins,addXP,showToast}){
  const[sc,setSc]=useState(null);const[msgs,setMsgs]=useState([]);const[inp,setInp]=useState('');const[loading,setLoading]=useState(false);
  const t0=useRef(Date.now());const cRef=useRef(null);
  useEffect(()=>()=>{const m=Math.round((Date.now()-t0.current)/60000);if(m>0)addMins(m);},[]);
  useEffect(()=>{if(cRef.current)cRef.current.scrollTop=cRef.current.scrollHeight;},[msgs]);
  const callAI=async(scenario,history)=>{
    if(!apiKey){setMsgs([{r:'ai',t:'⚠️ Brak klucza Anthropic API. Przejdź do Ustawień i wpisz klucz, by korzystać z AI Roleplay.'}]);return;}
    setLoading(true);
    try{
      const messages=history.length>0?history:[{role:'user',content:'(Zacznij — przywitaj się i wejdź w rolę)'}];
      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,system:scenario.sys,messages})});
      const data=await res.json();
      setMsgs(h=>[...h,{r:'ai',t:data.content?.[0]?.text||'Lo siento, no entendí.'}]);
    }catch{setMsgs(h=>[...h,{r:'ai',t:'❌ Błąd połączenia. Sprawdź klucz API w Ustawieniach.'}]);}
    setLoading(false);
  };
  const startSc=scenario=>{setSc(scenario);setMsgs([]);callAI(scenario,[]);};
  const send=async()=>{
    if(!inp.trim()||loading)return;
    const txt=inp.trim();const newMsgs=[...msgs,{r:'user',t:txt}];
    setMsgs(newMsgs);setInp('');addXP(5);
    const history=[...msgs.map(m=>({role:m.r==='user'?'user':'assistant',content:m.t})),{role:'user',content:txt}];
    await callAI(sc,history);
  };
  return(
    <div>
      <div className="ph"><div className="pt">AI Roleplay 🎭</div><div className="ps">Ćwicz konwersację z AI grającym różne role. +5 XP za każdą wiadomość!</div></div>
      {!apiKey&&<div className="api-w">⚠️ <strong>Wymagany klucz API:</strong> Przejdź do <strong>Ustawień</strong> i wpisz klucz Anthropic API (console.anthropic.com → API Keys). Klucz przechowywany tylko lokalnie w przeglądarce.</div>}
      {!sc?(
        <div>
          <div className="stitle">Wybierz scenariusz</div>
          <div className="scng">{SCENARIOS.map(s=>(<div key={s.id} className="scc" onClick={()=>startSc(s)}><span className="sci">{s.icon}</span><div className="scn">{s.name}</div></div>))}</div>
          <div className="ib">💡 AI mówi TYLKO po hiszpańsku (A1-A2) i dyskretnie poprawia błędy gramatyczne po polsku. Nie bój się błędów — to część nauki!</div>
          <div className="stitle">Przykładowe pierwsze zdania</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(210px,1fr))',gap:9}}>
            {[{sc:'🍽️',p:'Hola, ¿me puede traer la carta?'},{sc:'🩺',p:'Buenos días, me duele la cabeza.'},{sc:'🏨',p:'Hola, tengo una reserva a nombre de...'},{sc:'🛒',p:'¿Cuánto cuesta esto, por favor?'}].map(e=>(
              <div key={e.sc} style={{padding:'11px 13px',background:'var(--cd)',border:'1px solid var(--bd)',borderRadius:9}}><div style={{fontSize:10,fontWeight:700,color:'var(--tx3)',marginBottom:4}}>{e.sc}</div><div className="ses" style={{fontSize:14}}>{e.p}</div></div>
            ))}
          </div>
        </div>
      ):(
        <div>
          <div style={{display:'flex',alignItems:'center',gap:11,marginBottom:14}}>
            <button className="btn btn-s bsm" onClick={()=>setSc(null)}>← Scenariusze</button>
            <span style={{fontSize:20}}>{sc.icon}</span><strong style={{fontSize:14}}>{sc.name}</strong>
            <span style={{marginLeft:'auto',fontSize:12,color:'var(--tx3)'}}>💬 {msgs.filter(m=>m.r==='user').length} wiad. · +{msgs.filter(m=>m.r==='user').length*5} XP</span>
          </div>
          <div className="cw" ref={cRef}>
            {msgs.map((m,i)=>(<div key={i} className={`cm ${m.r==='user'?'u':'a'}`}>{m.t}</div>))}
            {loading&&(<div className="cm ty">Pisze{[0,1,2].map(i=>(<span key={i} style={{display:'inline-block',width:5,height:5,borderRadius:'50%',background:'var(--tx3)',margin:'0 2px',verticalAlign:'middle',animation:`dot 1.1s ${i*.2}s infinite`}}/>))}</div>)}
          </div>
          <div className="cir">
            <input className="ci" value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}} placeholder="Wpisz po hiszpańsku… (Enter = wyślij)" disabled={loading}/>
            <button className="btn btn-p" onClick={send} disabled={loading||!inp.trim()}>Wyślij</button>
          </div>
        </div>
      )}
    </div>
  );
}

function ProgressView({stats,cards,done}){
  const xpLvl=Math.floor(stats.xp/500)+1;const xpPct=(stats.xp%500)/500*100;
  const learned=cards.filter(c=>c.reps>=3).length;const mature=cards.filter(c=>(c.interval||1)>=21).length;
  const achs=[
    {ic:'🎓',t:'Pierwsza lekcja',d:'Ukończono lekcję 1',ok:done.length>=1},
    {ic:'🔥',t:'Uczeń miesiąca',d:'Ukończono 3 lekcje',ok:done.length>=3},
    {ic:'📚',t:'Biblioteka',d:'Masz 20+ fiszek w SRS',ok:cards.length>=20},
    {ic:'💫',t:'Mistrz powtórek',d:'Powtórzono 50+ fiszek',ok:(stats.reviewsDone||0)>=50},
    {ic:'🏆',t:'Kompletny kurs',d:'Ukończono wszystkie dostępne lekcje',ok:done.length>=5},
    {ic:'⚡',t:'XP Legend',d:'Zdobyto 500+ XP',ok:stats.xp>=500},
  ];
  const hm=Array.from({length:49},()=>{const r=Math.random();return r<.45?'':r<.62?'l1':r<.76?'l2':r<.88?'l3':'l4';});
  return(
    <div>
      <div className="ph"><div className="pt">Postęp</div><div className="ps">Szczegółowy przegląd Twojej nauki</div></div>
      <div className="sg">{[{ic:'⭐',v:stats.xp,l:'Łączne XP'},{ic:'🎓',v:xpLvl,l:'Aktualny poziom'},{ic:'📖',v:done.length,l:'Lekcje'},{ic:'🃏',v:cards.length,l:'Fiszki w SRS'}].map(s=>(<div key={s.l} className="sc"><div className="sc-ic">{s.ic}</div><div className="sc-v">{s.v}</div><div className="sc-l">{s.l}</div></div>))}</div>
      <div style={{marginBottom:24}}>
        <div className="stit">📊 Statystyki</div>
        {[{lbl:'Poziom XP',val:xpPct,txt:`${stats.xp%500}/500 XP do poz. ${xpLvl+1}`},{lbl:'Lekcje',val:done.length/5*100,txt:`${done.length}/5 dostępnych`},{lbl:'Fiszki opanowane',val:cards.length?learned/cards.length*100:0,txt:`${learned}/${cards.length} (≥3 pow.)`},{lbl:'Fiszki dojrzałe',val:cards.length?mature/cards.length*100:0,txt:`${mature} z interwałem ≥21 dni`}].map(p=>(
          <div key={p.lbl} className="prb"><div className="prl"><span>{p.lbl}</span><span>{p.txt}</span></div><div className="prbar"><div className="prf" style={{width:`${Math.min(100,p.val)}%`}}/></div></div>
        ))}
      </div>
      <div style={{marginBottom:24}}>
        <div className="stit">📅 Aktywność (7 tygodni)</div>
        <div className="hmg">{hm.map((c,i)=><div key={i} className={`hmc${c?' '+c:''}`}/>)}</div>
        <div style={{fontSize:11,color:'var(--tx3)',marginTop:7}}>⬜ brak · 🟥 mała · 🔴 średnia · ❤️ duża aktywność</div>
      </div>
      <div>
        <div className="stit">🏆 Odznaki</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:9}}>
          {achs.map(a=>(<div key={a.t} className={`ach${!a.ok?' ach-lk':''}`}><div className="ach-i">{a.ic}</div><div><div className="ach-t">{a.t}</div><div className="ach-d">{a.d}</div></div>{a.ok&&<div style={{marginLeft:'auto',fontSize:18}}>✅</div>}</div>))}
        </div>
      </div>
    </div>
  );
}

function SettingsView({lang,setLang,apiKey,setApiKey,showToast}){
  const[draft,setDraft]=useState(apiKey);const[show,setShow]=useState(false);
  return(
    <div>
      <div className="ph"><div className="pt">Ustawienia</div><div className="ps">Personalizacja aplikacji i konfiguracja AI</div></div>
      <div style={{marginBottom:28}}>
        <div className="stit">🌍 Wybór języka</div>
        <div className="los">{Object.entries(LANGS).map(([code,lc])=>(<div key={code} className={`lo${lang===code?' on':''}`} onClick={()=>{setLang(code);showToast(`${lc.flag} Zmieniono na ${lc.name}!`);}}><span className="lo-f">{lc.flag}</span><div className="lo-n">{lc.name}</div><div className="lo-s">{lc.native}</div></div>))}</div>
        <div className="ib" style={{marginTop:11}}>💡 Treści lekcji są po <strong>Hiszpańsku</strong>. Pełne wsparcie Włoskiego i Francuskiego planowane w v2.</div>
      </div>
      <div style={{marginBottom:28}}>
        <div className="stit">🤖 Anthropic API (AI Roleplay)</div>
        <div className="ib">Stwórz konto na <strong>console.anthropic.com</strong> → API Keys → nowy klucz. Klucz przechowywany <strong>wyłącznie lokalnie</strong> — nie jest wysyłany nigdzie poza Anthropic API.</div>
        <div style={{marginBottom:12}}>
          <label className="fl">Klucz Anthropic API</label>
          <div style={{display:'flex',gap:8}}>
            <input className="fi" type={show?'text':'password'} value={draft} onChange={e=>setDraft(e.target.value)} placeholder="sk-ant-api03-..." style={{flex:1,fontFamily:'monospace',fontSize:13}}/>
            <button className="btn btn-s" onClick={()=>setShow(s=>!s)}>{show?'🙈':'👁'}</button>
          </div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-p" onClick={()=>{setApiKey(draft);showToast('✅ Klucz zapisany!');}}>Zapisz</button>
          {apiKey&&<button className="btn btn-s" onClick={()=>{setApiKey('');setDraft('');showToast('Klucz usunięty');}}>Usuń</button>}
        </div>
        {apiKey&&<div style={{marginTop:10,fontSize:12,color:'var(--ol)',fontWeight:700}}>✅ Klucz skonfigurowany — AI Roleplay aktywny!</div>}
      </div>
      <div style={{marginBottom:28}}>
        <div className="stit">🗑️ Dane & Prywatność</div>
        <p style={{fontSize:13,color:'var(--tx2)',marginBottom:13,lineHeight:1.65}}>Wszystkie dane przechowywane <strong>lokalnie w przeglądarce</strong> (localStorage). Żadnych serwerów.</p>
        <button className="btn btn-s" onClick={()=>{if(window.confirm('Usunąć WSZYSTKIE dane? Tego nie można cofnąć!')){localStorage.clear();window.location.reload();}}}>🗑️ Wyczyść wszystkie dane</button>
      </div>
      <div>
        <div className="stit">📖 O aplikacji</div>
        <div style={{fontSize:13,color:'var(--tx2)',lineHeight:1.85}}>
          <strong>HablaConmigo</strong> — nauka języka metodą Comprehensible Input + SRS.<br/>
          Inspirowane: <em>Anki</em> (SRS), <em>LingQ</em> (zdania w kontekście), <em>Taalhammer</em> (całe frazy), <em>Pimsleur</em> (powtórki audytywne).<br/>
          Treści: kurs <em>«Hiszpański Jest Prosty»</em> Katarzyny Krzemińskiej.<br/>
          Wersja 1.0 · React 18 · SM-2 · Claude API
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
